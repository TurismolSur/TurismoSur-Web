# SonarQube/SonarCloud Configuración para TurismoSur
# Este archivo configura el escaneo de código y calidad

# ============================================
# IDENTIFICACIÓN DEL PROYECTO
# ============================================
# Clave única del proyecto en SonarCloud/SonarQube
sonar.projectKey=3ls42025_TurismoSur
sonar.projectName=TurismoSur

# Organización en SonarCloud
sonar.organization=3ls42025

# ============================================
# CONFIGURACIÓN DE CÓDIGO FUENTE
# ============================================
# Ruta al código fuente
sonar.sources=src

# Idioma principal del proyecto
sonar.language=ts

# ============================================
# EXCLUSIONES
# ============================================
# Excluir archivos y carpetas del análisis
sonar.exclusions=\
  **/node_modules/**,\
  **/.next/**,\
  **/dist/**,\
  **/coverage/**,\
  **/*.config.js,\
  **/*.config.ts,\
  **/jest.setup.js,\
  **/jest.config.js,\
  **/*.stories.tsx,\
  **/*.d.ts

# Excluir tests del análisis principal (se analizarán con cobertura)
sonar.test.inclusions=**/__tests__/**,**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

# ============================================
# COBERTURA DE CÓDIGO
# ============================================
# Ruta al archivo de cobertura de tests unitarios
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Ruta alternativa si usas coverage.xml (formato Cobertura)
# sonar.javascript.coverage.reportPaths=coverage/coverage-final.json

# ============================================
# QUALITY GATES
# ============================================
# Nombre del Quality Gate (debe existir en SonarCloud)
sonar.qualitygate.name=TurismoSur-Default

# ============================================
# CONFIGURACIÓN DE ANÁLISIS
# ============================================
# Versión del proyecto (opcional, útil para tracking)
sonar.projectVersion=1.0.0

# Encoding de los archivos
sonar.sourceEncoding=UTF-8

# ============================================
# CONFIGURACIÓN ESPECÍFICA PARA JAVASCRIPT/TYPESCRIPT
# ============================================
# Archivos incluidos en análisis
sonar.javascript.file.suffixes=.js,.jsx,.ts,.tsx,.mjs

# Tipo sonarlint node para análisis específico de Node.js
sonar.nodejs.enabled=true

# ============================================
# CONFIGURACIÓN DE NEXT.JS
# ============================================
# Excluir carpeta de build de Next.js del análisis de duplicación
sonar.cpd.exclusions=**/.next/**

# ============================================
# NOTAS DE CONFIGURACIÓN
# ============================================
# 
# 1. COBERTURA:
#    - Jest genera coverage/lcov.info (recomendado para JS)
#    - O usa coverage.xml con --coverage --collectCoverageFrom
#
# 2. QUALITY GATES PREDETERMINADO:
#    SonarCloud tiene QG por defecto que incluye:
#    - Cobertura >= 80%
#    - No hay bugs nuevos
#    - No hay vulnerabilidades nuevas
#    - No hay code smells nuevos
#
# 3. QUALITY GATES PERSONALIZADO:
#    Ve a SonarCloud → Quality Gates → TurismoSur-Default
#    Configura condiciones como:
#    - Overall Coverage < 70%: FAIL
#    - Blocker Issues > 0: FAIL
#    - Critical Issues > 0: FAIL (opcional)
#
# 4. SECRETOS REQUERIDOS EN GITHUB:
#    - SONAR_TOKEN: Genera en SonarCloud → My Account → Security
#    - SONAR_HOST_URL: https://sonarcloud.io (para SonarCloud)
#    - O SONAR_ORGANIZATION: tu organización en SonarCloud
#
